
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.app{display:grid;grid-template-columns:300px 1fr;min-height:600px}
.sidebar{border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column}
.panel{border-bottom:0.5px solid var(--color-border-tertiary);padding:14px}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.content{padding:14px;flex:1;overflow-y:auto;max-height:830px}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
input[type=number]{width:auto}
input:focus,select:focus{outline:none;border-color:#1D9E75}
button{padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
button:hover{background:var(--color-background-secondary)}
button.primary{background:#1D9E75;color:#fff;border-color:#0F6E56}
button.primary:hover{background:#0F6E56}
button.danger{color:#A32D2D;border-color:#F09595;background:#FCEBEB}
button.danger:hover{background:#F7C1C1}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:500}
.b-green{background:#E1F5EE;color:#0F6E56}
.b-amber{background:#FAEEDA;color:#854F0B}
.b-gray{background:#F1EFE8;color:#5F5E5A}
.b-red{background:#FCEBEB;color:#A32D2D}
.tab-row{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{padding:9px 14px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:var(--color-text-primary);border-bottom-color:#1D9E75;font-weight:500}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.stat-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.stat-num{font-size:20px;font-weight:500}
.stat-lbl{font-size:11px;color:var(--color-text-secondary)}
.scroll{max-height:490px;overflow-y:auto}
.g-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:4px;background:var(--color-background-primary);user-select:none}
.g-item.draggable{cursor:grab}
.g-item.dragging{opacity:.4;border-style:dashed}
.g-item.drag-over-item{border-color:#1D9E75;background:#E1F5EE}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gname{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.xbtn{width:20px;height:20px;border:none;border-radius:50%;background:transparent;color:var(--color-text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;padding:0;flex-shrink:0;line-height:1}
.xbtn:hover{background:#FCEBEB;color:#A32D2D}
.icobtn{width:24px;height:24px;border:0.5px solid var(--color-border-secondary);border-radius:6px;background:transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;padding:0;flex-shrink:0;line-height:1}
.icobtn:hover{background:var(--color-background-secondary)}
.tcard{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.thead{padding:8px 12px;display:flex;align-items:center;gap:7px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.tnum{width:24px;height:24px;border-radius:50%;background:#1D9E75;color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tname{font-size:13px;font-weight:500;flex:1}
.tbody{padding:8px 10px;min-height:44px;transition:background .15s}
.tbody.over{background:#E1F5EE}
.tg-item{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:6px;font-size:13px;margin-bottom:3px;background:var(--color-background-secondary);cursor:grab;user-select:none}
.tg-item:hover{background:var(--color-background-tertiary)}
.tg-item.dragging{opacity:.4}
.tempty{font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:8px 0}
.capbar{height:3px;border-radius:2px;background:var(--color-border-tertiary);margin:3px 12px 0;overflow:hidden}
.capfill{height:100%;border-radius:2px;transition:width .3s}
.tfooter{padding:6px 10px}
.toast{position:fixed;bottom:14px;right:14px;background:#1D9E75;color:#fff;padding:6px 14px;border-radius:var(--border-radius-md);font-size:13px;display:none;align-items:center;gap:6px;z-index:9999}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:20px;width:340px;max-width:95vw}
.modal h3{font-size:15px;font-weight:500;margin-bottom:14px}
.mrow{margin-bottom:10px}
.mrow label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:3px}
.mrow input{width:100%}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.pick-list{max-height:200px;overflow-y:auto;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);margin-bottom:8px}
.pick-item{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.pick-item:last-child{border-bottom:none}
.pick-item:hover{background:var(--color-background-secondary)}
.pick-item.on{background:#E1F5EE}
.pick-chk{width:16px;height:16px;border:1.5px solid var(--color-border-secondary);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.pick-item.on .pick-chk{background:#1D9E75;border-color:#0F6E56;color:#fff}
</style>

<h2 class="sr-only">Апликација за распоред на гости по маси за свадба</h2>
<div class="toast" id="toast">✓ Зачувано</div>

<!-- EDIT TABLE MODAL -->
<div class="overlay" id="ov-edit">
<div class="modal">
  <h3>✏️ Уреди маса</h3>
  <div class="mrow"><label>Број на маса</label><input type="number" id="e-num" min="1" style="width:100%"></div>
  <div class="mrow"><label>Назив (опционално, пр. VIP)</label><input type="text" id="e-label" style="width:100%"></div>
  <div class="mrow"><label>Капацитет (број на гости)</label>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="adjCap(-1)" style="padding:4px 10px;font-size:16px;font-weight:500">−</button>
      <input type="number" id="e-cap" min="1" max="30" style="width:70px;text-align:center">
      <button onclick="adjCap(1)" style="padding:4px 10px;font-size:16px;font-weight:500">+</button>
    </div>
  </div>
  <div class="mbtns">
    <button onclick="closeOverlay('ov-edit')">Откажи</button>
    <button class="primary" onclick="saveEdit()">Зачувај</button>
  </div>
</div>
</div>

<!-- ADD GUESTS MODAL -->
<div class="overlay" id="ov-add">
<div class="modal">
  <h3 id="add-title">Додај гости</h3>
  <div style="font-size:12px;color:#0F6E56;margin-bottom:8px" id="add-free-lbl"></div>
  <input type="text" id="add-search" placeholder="Пребарај гост..." style="margin-bottom:8px;width:100%" oninput="renderPickList()">
  <div class="pick-list" id="pick-list"></div>
  <div class="mbtns">
    <button onclick="closeOverlay('ov-add')">Откажи</button>
    <button class="primary" onclick="confirmAdd()">Додај избрани</button>
  </div>
</div>
</div>

<div class="app">
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="panel">
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Вкупно гости</div></div>
      <div class="stat-box"><div class="stat-num" id="s-asgn">0</div><div class="stat-lbl">Распоредени</div></div>
      <div class="stat-box"><div class="stat-num" id="s-tbl">0</div><div class="stat-lbl">Маси</div></div>
      <div class="stat-box"><div class="stat-num" id="s-free">0</div><div class="stat-lbl">Неразпоредени</div></div>
    </div>
    <div style="font-size:11px;color:var(--color-text-tertiary);text-align:right" id="saved-ts"></div>
  </div>

  <div class="tab-row">
    <div class="tab active" onclick="switchTab('guests')">Гости</div>
    <div class="tab" onclick="switchTab('tables')">Маси</div>
    <div class="tab" onclick="switchTab('import')">Листа на гости</div>
  </div>

  <div id="tab-guests" style="display:flex;flex-direction:column;flex:1;padding:14px;gap:7px">
    <div style="display:flex;gap:6px">
      <input id="g-inp" placeholder="Име на гостин..." style="flex:1" onkeydown="if(event.key==='Enter')addGuest()">
      <button class="primary" onclick="addGuest()" style="padding:6px 10px">+</button>
    </div>
    <input id="g-search" placeholder="Пребарај..." oninput="renderGuests()">
    <select id="g-filter" onchange="renderGuests()" style="font-size:12px">
      <option value="">Сите гости</option>
      <option value="no">Неразпоредени</option>
      <option value="yes">Распоредени</option>
    </select>
    <div class="scroll" id="g-list"></div>
  </div>

  <div id="tab-tables" style="display:none;flex-direction:column;flex:1;padding:14px;gap:7px">
    <div style="display:flex;gap:6px;align-items:center">
      <label style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap">Капацитет:</label>
      <input type="number" id="t-cap" min="1" max="30" value="10" style="width:60px">
    </div>
    <div style="display:flex;gap:6px">
      <button class="primary" onclick="addTable()" style="flex:1;justify-content:center">+ Додај маса</button>
      <button onclick="bulkAdd()" style="flex:1;justify-content:center">+ Повеќе маси</button>
    </div>
    <div class="scroll" id="t-sidebar"></div>
  </div>

  <div id="tab-import" style="display:none;flex-direction:column;flex:1;padding:14px;gap:7px">
    <div style="font-size:12px;color:var(--color-text-secondary)">Залепи листа на гости, по едно име во ред:</div>
    <textarea id="imp-txt" rows="10" placeholder="Ана Стојанова&#10;Марко Петров&#10;..." style="resize:vertical;font-size:13px;width:100%"></textarea>
    <button class="primary" onclick="importGuests()" style="justify-content:center">✓ Прикачи гости</button>
    <div style="font-size:12px;color:#0F6E56" id="imp-status"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <span style="font-size:13px;font-weight:500;color:var(--color-text-secondary);flex:1">Распоред по маси</span>
    <button onclick="autoAssign()">⚡ Авто-распоред</button>
    <button onclick="clearAssign()">↩ Исчисти распоред</button>
    <button class="danger" onclick="clearAll()">✕ Избриши сè</button>
    <button onclick="exportTxt()">↓ Симни список со гости</button>
  </div>
  <div class="content">
    <div id="no-tbl" style="text-align:center;padding:60px 20px;color:var(--color-text-tertiary)">
      <div style="font-size:36px;margin-bottom:10px">⬜</div>
      <div>Нема додадени маси. Одете на <b>Маси</b>.</div>
    </div>
    <div id="tbl-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px"></div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 1. Твојата Firebase конфигурација (ЗАМЕНИ ЈА СО ТВОЈАТА ОД КОНЗОЛАТА)
const firebaseConfig = {
  apiKey: "AIzaSyB6l-lnwepOGx5Ju0EUsg4vJ9I6X_Rq38Y",
  authDomain: "wedding-planner-732f1.firebaseapp.com",
  projectId: "wedding-planner-732f1",
  storageBucket: "wedding-planner-732f1.firebasestorage.app",
  messagingSenderId: "1082959550709",
  appId: "1:1082959550709:web:8766513ae77297d9098dbc",
  measurementId: "G-9PRJLTBER8"
};

// Иницијализација на Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'wedding_data');

// Глобални променливи на апликацијата
window.guests = [];
window.tables = [];
window.nextGid = 1;

let dragGid=null, editId=null, addId=null, picked=new Set();
let saveTimer=null, toastTimer=null;

/* ── СИНХРОНИЗАЦИЈА СО БАЗАТА (ОБЛАК) ── */

// Нов СУПЕР-БРЗ SAVE кој праќа податоци во облакот
window.save = function() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    set(dbRef, {
      guests: window.guests,
      tables: window.tables,
      nextGid: window.nextGid,
      ts: Date.now()
    }).then(() => {
      // Покажи тост порака за успешно зачувување
      const el = document.getElementById('toast'); 
      el.style.display = 'flex';
      clearTimeout(toastTimer); 
      toastTimer = setTimeout(() => el.style.display = 'none', 1600);
    }).catch(error => console.error("Грешка при запис:", error));
  }, 400); // 400msdebounce за да не ја преоптоваруваме базата додека куцаш
};

// Автоматско слушање на промени во реално време (РЕШЕНИЕ ЗА ДРУГИОТ УРЕД)
onValue(dbRef, (snapshot) => {
  const d = snapshot.val();
  if (d) {
    window.guests = d.guests || [];
    window.tables = d.tables || [];
    window.nextGid = d.nextGid || 1;
    if (d.ts) {
      const t = new Date(d.ts).toLocaleTimeString('mk-MK', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('saved-ts').textContent = 'Ажурирано во ' + t;
    }
  } else {
    window.guests = []; window.tables = []; window.nextGid = 1;
    document.getElementById('saved-ts').textContent = '';
  }
  renderAll(); // Автоматски го пререндерува екранот штом некој уред смени нешто!
});


/* ── ГЛОБАЛНИ ФУНКЦИИ (Прикачени на window за HTML инлајн повици) ── */

window.switchTab = function(tab) {
  ['guests','tables','import'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.style.display=t===tab?'flex':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['guests','tables','import'][i]===tab));
  if(tab==='tables') renderSidebar();
}

window.addGuest = function() {
  const inp=document.getElementById('g-inp');
  const name=inp.value.trim(); if(!name) return;
  window.guests.push({id:window.nextGid++,name,tid:null});
  inp.value=''; renderAll(); save();
}

window.removeGuest = function(id) {
  window.guests=window.guests.filter(g=>g.id!==id); renderAll(); save();
}

window.importGuests = function() {
  const lines=document.getElementById('imp-txt').value.split('\n').map(l=>l.trim()).filter(Boolean);
  let added=0;
  lines.forEach(name=>{
    if(!window.guests.find(g=>g.name.toLowerCase()===name.toLowerCase())){
      window.guests.push({id:window.nextGid++,name,tid:null}); added++;
    }
  });
  document.getElementById('imp-status').textContent=`✓ Додадени ${added} гости (${lines.length-added} дупликати).`;
  renderAll(); save();
}

function nextNum(){
  const nums=window.tables.map(t=>t.num); let n=1; while(nums.includes(n)) n++; return n;
}

window.addTable = function() {
  const cap=Math.max(1,parseInt(document.getElementById('t-cap').value)||10);
  window.tables.push({id:'t'+(Date.now()+Math.random()).toString(36),num:nextNum(),label:'',cap});
  window.tables.sort((a,b)=>a.num-b.num); renderAll(); save();
}

window.bulkAdd = function() {
  const cnt=parseInt(prompt('Колку маси?','40')); if(!cnt||isNaN(cnt)) return;
  const cap=Math.max(1,parseInt(document.getElementById('t-cap').value)||10);
  for(let i=0;i<cnt;i++) window.tables.push({id:'t'+(Date.now()+Math.random()+i).toString(36),num:nextNum(),label:'',cap});
  window.tables.sort((a,b)=>a.num-b.num); renderAll(); save();
}

window.removeTable = function(id) {
  window.guests.forEach(g=>{if(g.tid===id)g.tid=null;});
  window.tables=window.tables.filter(t=>t.id!==id); renderAll(); save();
}

window.openEdit = function(id) {
  const t=window.tables.find(x=>x.id===id); if(!t) return;
  editId=id;
  document.getElementById('e-num').value=t.num;
  document.getElementById('e-label').value=t.label||'';
  document.getElementById('e-cap').value=t.cap;
  document.getElementById('ov-edit').classList.add('show');
}

window.adjCap = function(d) {
  const inp=document.getElementById('e-cap');
  inp.value=Math.max(1,Math.min(30,(parseInt(inp.value)||10)+d));
}

window.saveEdit = function() {
  const t=window.tables.find(x=>x.id===editId); if(!t) return;
  const num=parseInt(document.getElementById('e-num').value);
  if(!num||num<1){alert('Внеси валиден број.');return;}
  if(window.tables.find(x=>x.id!==editId&&x.num===num)){alert('Тој број веќе постои!');return;}
  t.num=num;
  t.label=document.getElementById('e-label').value.trim();
  const newCap=Math.max(1,parseInt(document.getElementById('e-cap').value)||10);
  if(newCap<window.guests.filter(g=>g.tid===t.id).length){
    if(!confirm(`Има повеќе гости (${window.guests.filter(g=>g.tid===t.id).length}) отколку новиот капацитет (${newCap}). Вишокот ќе се отстрани. Продолжи?`)) return;
    window.guests.filter(g=>g.tid===t.id).slice(newCap).forEach(g=>g.tid=null);
  }
  t.cap=newCap;
  window.tables.sort((a,b)=>a.num-b.num);
  closeOverlay('ov-edit'); renderAll(); save();
}

window.openAddGuests = function(id) {
  const t=window.tables.find(x=>x.id===id); if(!t) return;
  addId=id; picked=new Set();
  const seated=window.guests.filter(g=>g.tid===id).length;
  document.getElementById('add-title').textContent='Додај гости на Маса '+t.num+(t.label?' — '+t.label:'');
  document.getElementById('add-free-lbl').textContent='Слободни места: '+(t.cap-seated);
  document.getElementById('add-search').value='';
  window.renderPickList();
  document.getElementById('ov-add').classList.add('show');
}

window.renderPickList = function() {
  const q=document.getElementById('add-search').value.toLowerCase();
  const unassigned=window.guests.filter(g=>!g.tid&&(!q||g.name.toLowerCase().includes(q)));
  const el=document.getElementById('pick-list');
  if(!unassigned.length){el.innerHTML='<div style="padding:12px;text-align:center;font-size:13px;color:var(--color-text-tertiary)">Нема неразпоредени гости.</div>';return;}
  el.innerHTML=unassigned.map(g=>{
    const on=picked.has(g.id);
    return `<div class="pick-item${on?' on':''}" onclick="togglePick(${g.id})">
      <div class="pick-chk">${on?'✓':''}</div>
      <span>${esc(g.name)}</span>
    </div>`;
  }).join('');
}

window.togglePick = function(id) {
  picked.has(id)?picked.delete(id):picked.add(id);
  window.renderPickList();
}

window.confirmAdd = function() {
  const t=window.tables.find(x=>x.id===addId); if(!t) return;
  const seated=window.guests.filter(g=>g.tid===t.id).length;
  const free=t.cap-seated;
  const toAdd=[...picked];
  if(toAdd.length>free){alert(`Само ${free} слободни места!`);return;}
  toAdd.forEach(id=>{const g=window.guests.find(x=>x.id===id);if(g)g.tid=addId;});
  closeOverlay('ov-add'); renderAll(); save();
}

/* ── DRAG & DROP ДРАЈВЕРИ ── */
window.onDragStart = function(e,gid) {
  dragGid=gid;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(gid));
  e.currentTarget.classList.add('dragging');
}
window.onDragEnd = function(e) {
  dragGid=null;
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.over').forEach(el=>el.classList.remove('over'));
}
window.onDragOver = function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('over');
}
window.onDragLeave = function(e) {
  e.currentTarget.classList.remove('over');
}
window.onDrop = function(e,tid) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  const gid=parseInt(e.dataTransfer.getData('text/plain'));
  if(!gid) return;
  const g=window.guests.find(x=>x.id===gid); if(!g) return;
  const t=window.tables.find(x=>x.id===tid); if(!t) return;
  const seated=window.guests.filter(x=>x.tid===tid).length;
  if(g.tid!==tid&&seated>=t.cap){alert('Масата е полна!');return;}
  g.tid=tid;
  renderAll(); save();
}

window.removeFromTable = function(gid) {
  const g=window.guests.find(x=>x.id===gid); if(g){g.tid=null; renderAll(); save();}
}

window.autoAssign = function() {
  const un=window.guests.filter(g=>!g.tid); if(!un.length){alert('Сите гости се распоредени!');return;}
  let i=0;
  for(const t of [...window.tables].sort((a,b)=>a.num-b.num)){
    const free=t.cap-window.guests.filter(g=>g.tid===t.id).length;
    for(let f=0;f<free&&i<un.length;f++) un[i++].tid=t.id;
    if(i>=un.length) break;
  }
  if(i<un.length) alert(`Не може да се распоредат ${un.length-i} гости — нема доволно места!`);
  renderAll(); save();
}

window.clearAssign = function() {
  if(!confirm('Да се исчисти распоредот?')) return;
  window.guests.forEach(g=>g.tid=null); renderAll(); save();
}

window.clearAll = function() {
  if(!confirm('Да се избришат сите гости и маси од базата?')) return;
  window.guests=[]; window.tables=[]; window.nextGid=1;
  save();
}

window.exportTxt = function() {
  const lines=['РАСПОРЕД НА ГОСТИ ПО МАСИ\n'];
  [...window.tables].sort((a,b)=>a.num-b.num).forEach(t=>{
    const tg=window.guests.filter(g=>g.tid===t.id);
    lines.push(`\nМаса ${t.num}${t.label?' — '+t.label:''} (${tg.length}/${t.cap})`);
    tg.forEach(g=>lines.push('  - '+g.name));
  });
  const un=window.guests.filter(g=>!g.tid);
  if(un.length){lines.push('\nНЕРАСПОРЕДЕНИ:'); un.forEach(g=>lines.push('  - '+g.name));}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download='svadba-raspored.txt'; a.click();
}

/* ── RENDER СЕКЦИЈА ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderStats(){
  const tot=window.guests.length, asgn=window.guests.filter(g=>g.tid).length;
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-asgn').textContent=asgn;
  document.getElementById('s-tbl').textContent=window.tables.length;
  document.getElementById('s-free').textContent=tot-asgn;
}

window.renderGuests = function() {
  const q=document.getElementById('g-search').value.toLowerCase();
  const f=document.getElementById('g-filter').value;
  const list=window.guests.filter(g=>{
    if(q&&!g.name.toLowerCase().includes(q)) return false;
    if(f==='yes'&&!g.tid) return false;
    if(f==='no'&&g.tid) return false;
    return true;
  });
  const el=document.getElementById('g-list');
  if(!list.length){el.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:10px">Нема гости.</div>';return;}
  el.innerHTML=list.map(g=>{
    const t=g.tid?window.tables.find(x=>x.id===g.tid):null;
    const dotColor=g.tid?'#1D9E75':'#B4B2A9';
    return `<div class="g-item draggable" draggable="true"
      ondragstart="onDragStart(event,${g.id})"
      ondragend="onDragEnd(event)">
      <div class="dot" style="background:${dotColor}"></div>
      <span class="gname">${esc(g.name)}</span>
      ${t?`<span style="font-size:11px;color:var(--color-text-secondary)">М${t.num}</span>`:'<span class="badge b-gray" style="font-size:10px">без маса</span>'}
      <button class="xbtn" onclick="removeGuest(${g.id})" title="Избриши">✕</button>
    </div>`;
  }).join('');
}

function renderSidebar(){
  const el=document.getElementById('t-sidebar');
  if(!window.tables.length){el.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:10px">Нема маси.</div>';return;}
  el.innerHTML=[...window.tables].sort((a,b)=>a.num-b.num).map(t=>{
    const cnt=window.guests.filter(g=>g.tid===t.id).length;
    return `<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
      <div class="tnum">${t.num}</div>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.label||'Маса '+t.num}</span>
      <span style="font-size:11px;color:var(--color-text-secondary)">${cnt}/${t.cap}</span>
      <button class="icobtn" onclick="openEdit('${t.id}')" title="Уреди">✏️</button>
      <button class="xbtn" onclick="removeTable('${t.id}')" title="Избриши">✕</button>
    </div>`;
  }).join('');
}

function renderTables(){
  const grid=document.getElementById('tbl-grid');
  const noTbl=document.getElementById('no-tbl');
  if(!window.tables.length){noTbl.style.display='';grid.innerHTML='';return;}
  noTbl.style.display='none';
  const sorted=[...window.tables].sort((a,b)=>a.num-b.num);
  grid.innerHTML=sorted.map(t=>{
    const tg=window.guests.filter(g=>g.tid===t.id);
    const cnt=tg.length, pct=t.cap>0?Math.round(cnt/t.cap*100):0;
    const fc=pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#1D9E75';
    const bc=pct>=100?'b-red':pct>=80?'b-amber':'b-green';
    return `<div class="tcard">
      <div class="thead">
        <div class="tnum">${t.num}</div>
        <span class="tname">${t.label||'Маса '+t.num}</span>
        <span class="badge ${bc}">${cnt}/${t.cap}</span>
        <button class="icobtn" onclick="openEdit('${t.id}')" title="Уреди">✏️</button>
      </div>
      <div class="capbar"><div style="height:100%;border-radius:2px;background:${fc};width:${Math.min(100,pct)}%;transition:width .3s"></div></div>
      <div class="tbody" id="tb-${t.id}"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,'${t.id}')">
        ${tg.length===0?'<div class="tempty">Влечи гост тука</div>':''}
        ${tg.map(g=>`<div class="tg-item" draggable="true"
          ondragstart="onDragStart(event,${g.id})"
          ondragend="onDragEnd(event)">
          <div class="dot" style="background:#1D9E75;width:6px;height:6px"></div>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.name)}</span>
          <button class="xbtn" onclick="removeFromTable(${g.id})" title="Отстрани">✕</button>
        </div>`).join('')}
      </div>
      <div class="tfooter">
        <button onclick="openAddGuests('${t.id}')" style="width:100%;justify-content:center;font-size:12px">+ Додај гост на оваа маса</button>
      </div>
    </div>`;
  }).join('');
}

function renderAll(){
  renderStats(); window.renderGuests(); renderTables();
  if(document.getElementById('tab-tables').style.display==='flex') renderSidebar();
}

window.closeOverlay = function(id){ document.getElementById(id).classList.remove('show'); }
document.getElementById('ov-edit').addEventListener('click',function(e){if(e.target===this)closeOverlay('ov-edit');});
document.getElementById('ov-add').addEventListener('click',function(e){if(e.target===this)closeOverlay('ov-add');});

// Овозможи внесување на гост со Enter
document.getElementById('g-inp').addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    window.addGuest();
  }
});
</script>
